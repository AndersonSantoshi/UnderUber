<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnderUber - Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UnderUber">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-brand">
        <span class="header-subtitle">Dashboard</span>
        <!-- SVG LOGO - SEM BORDA -->
        <svg class="brand-icon-img" width="140" height="140" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="256" cy="256" r="240" fill="#FF8C00" opacity="0.08"/>
          <circle cx="256" cy="256" r="200" stroke="#FF8C00" stroke-width="6" fill="none" opacity="0.25"/>
          <circle cx="256" cy="256" r="80" fill="#FF8C00" opacity="0.12"/>
          <text x="256" y="280" font-family="Arial, sans-serif" font-size="120" font-weight="700" fill="#FF8C00" text-anchor="middle">U</text>
        </svg>
        <div class="header-time" id="horaAtual">22:28</div>
      </div>
    </header>

    <!-- SELETOR DE DATA -->
    <div class="date-selector">
      <button onclick="changeDate(-1)" class="date-btn">◀</button>
      <span id="displayDate" class="date-display">Hoje</span>
      <button onclick="changeDate(1)" class="date-btn">▶</button>
      <button onclick="goToToday()" class="date-today">Hoje</button>
    </div>

    <!-- BOTÃO PDF -->
    <div class="pdf-button-container">
      <button onclick="generatePDF()" class="btn-pdf">📄 Gerar PDF</button>
    </div>

    <section class="dashboard-cards">
      <div class="card">
        <div class="card-label">Lucro Líquido</div>
        <div class="card-value" id="lucroLiquido">R$ 0,00</div>
      </div>
      <div class="card">
        <div class="card-label">Ganho por KM</div>
        <div class="card-value" id="ganhoPorKm">R$ 0,00</div>
      </div>
      <div class="card">
        <div class="card-label">Total de Corridas</div>
        <div class="card-value" id="totalCorridas">0</div>
      </div>
      <div class="card">
        <div class="card-label">Margem Média</div>
        <div class="card-value" id="margemMedia">0,0%</div>
      </div>
    </section>

    <div class="empty-state" id="emptyState">
      <p>Nenhuma corrida registrada ainda.</p>
      <p>Vá para Nova Corrida para começar.</p>
    </div>

    <section class="recent-rides" id="recentRides" style="display:none;">
      <div id="ridesList"></div>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span>📊</span>
        <span>Dashboard</span>
      </a>
      <a href="nova-corrida.html" class="nav-item">
        <span>➕</span>
        <span>Nova Corrida</span>
      </a>
      <a href="historico.html" class="nav-item">
        <span>📋</span>
        <span>Histórico</span>
      </a>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>

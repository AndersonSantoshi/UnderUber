<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnderUber - Nova Corrida</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UnderUber">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-time" id="horaAtual">22:28</div>
      <div class="header-brand">
        <!-- LOGO -->
        <img src="icon-100.png" alt="UnderUber" class="brand-icon-img" width="50" height="50">
        <span class="header-subtitle">Nova Corrida</span>
      </div>
    </header>

    <form id="rideForm" class="form-container">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="data">
      </div>

      <div class="form-group">
        <label>KMs Rodados na Viagem</label>
        <input type="text" id="kmRodados" placeholder="Ex: 85,00" inputmode="decimal">
      </div>

      <div class="form-group">
        <label>Valor Bruto da Viagem (R$)</label>
        <input type="text" id="valorBruto" placeholder="Ex: 185,53" inputmode="decimal">
      </div>

      <h3 class="section-title">Parâmetros de Custo</h3>

      <div class="form-group">
        <label>Preço Combustível (R$)</label>
        <div class="input-with-label">
          <input type="text" id="precoCombustivel" placeholder="Ex: 3,69" inputmode="decimal">
          <span class="input-suffix">Por litro</span>
        </div>
      </div>

      <div class="form-group">
        <label>KM por Litro</label>
        <input type="text" id="kmPorLitro" placeholder="Ex: 7,4" inputmode="decimal">
      </div>

      <div class="form-group">
        <label>Custo de Locação do Veículo (R$)</label>
        <input type="text" id="aluguelDiario" placeholder="Ex: 114,29" inputmode="decimal">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Salvar Corrida</button>
        <button type="reset" class="btn btn-secondary">Cancelar</button>
      </div>
    </form>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>📊</span>
        <span>Dashboard</span>
      </a>
      <a href="nova-corrida.html" class="nav-item active">
        <span>➕</span>
        <span>Nova Corrida</span>
      </a>
      <a href="historico.html" class="nav-item">
        <span>📋</span>
        <span>Histórico</span>
      </a>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>

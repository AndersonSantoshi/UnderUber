<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnderUber - Nova Corrida</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-time" id="horaAtual">22:28</div>
      <div class="header-brand">
        <span class="brand-icon">🚗</span>
        <h1 class="header-title">UnderUber</h1>
        <span class="header-subtitle">Nova Corrida</span>
      </div>
    </header>

    <form id="rideForm" class="form-container">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="data" value="2026-07-22">
      </div>

      <div class="form-group">
        <label>KM Rodados</label>
        <input type="number" id="kmRodados" placeholder="85" step="0.1" required>
      </div>

      <div class="form-group">
        <label>Valor Bruto (R$)</label>
        <input type="number" id="valorBruto" placeholder="185,53" step="0.01" required>
      </div>

      <h3 class="section-title">Parâmetros de Custo</h3>

      <div class="form-group">
        <label>Preço Combustível (R$)</label>
        <div class="input-with-label">
          <input type="number" id="precoCombustivel" value="3.69" step="0.01">
          <span class="input-suffix">Por litro</span>
        </div>
      </div>

      <div class="form-group">
        <label>KM por Litro</label>
        <input type="number" id="kmPorLitro" value="7.4" step="0.1">
      </div>

      <div class="form-group">
        <label>Aluguel Diário (R$)</label>
        <input type="number" id="aluguelDiario" value="114.29" step="0.01">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Salvar Corrida</button>
        <button type="reset" class="btn btn-secondary">Cancelar</button>
      </div>
    </form>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>📊</span>
        <span>Dashboard</span>
      </a>
      <a href="nova-corrida.html" class="nav-item active">
        <span>➕</span>
        <span>Nova Corrida</span>
      </a>
      <a href="historico.html" class="nav-item">
        <span>📋</span>
        <span>Histórico</span>
      </a>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>

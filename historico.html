<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnderUber - Histórico</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UnderUber">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-time" id="horaAtual">22:28</div>
      <div class="header-brand">
        <!-- LOGO -->
        <svg class="brand-icon" width="36" height="36" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="256" cy="256" r="256" fill="url(#gradLogo)"/>
          <path d="M256 80C256 80 160 160 160 256C160 352 256 432 256 432C256 432 352 352 352 256C352 160 256 80 256 80Z" fill="#0A0A0A" opacity="0.9"/>
          <path d="M256 120C256 120 200 180 200 256C200 332 256 392 256 392C256 392 312 332 312 256C312 180 256 120 256 120Z" fill="#FFD700"/>
          <circle cx="256" cy="256" r="40" fill="#0A0A0A"/>
          <circle cx="256" cy="256" r="20" fill="#FFD700"/>
          <rect x="236" y="140" width="40" height="16" rx="8" fill="#FFD700" transform="rotate(45 256 148)"/>
          <rect x="236" y="356" width="40" height="16" rx="8" fill="#FFD700" transform="rotate(45 256 364)"/>
          <rect x="140" y="236" width="16" height="40" rx="8" fill="#FFD700" transform="rotate(45 148 256)"/>
          <rect x="356" y="236" width="16" height="40" rx="8" fill="#FFD700" transform="rotate(45 364 256)"/>
          <defs>
            <linearGradient id="gradLogo" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#FFA500"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="header-title">UnderUber</h1>
        <span class="header-subtitle">Histórico</span>
      </div>
    </header>

    <!-- SELETOR DE DATA DO HISTÓRICO -->
    <div class="date-selector">
      <button onclick="changeHistoricoDate(-1)" class="date-btn">◀</button>
      <span id="historicoDate" class="date-display">Hoje</span>
      <button onclick="changeHistoricoDate(1)" class="date-btn">▶</button>
      <button onclick="goToHistoricoToday()" class="date-today">Hoje</button>
    </div>

    <div id="historicoContent">
      <div class="day-summary" id="daySummary">
        <div class="day-date">Hoje</div>
        <div class="day-rides">0 corrida</div>
        <div class="day-profit" id="dayProfit">Lucro do dia R$ 0,00</div>
      </div>

      <div id="historicoList" class="historico-list"></div>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>📊</span>
        <span>Dashboard</span>
      </a>
      <a href="nova-corrida.html" class="nav-item">
        <span>➕</span>
        <span>Nova Corrida</span>
      </a>
      <a href="historico.html" class="nav-item active">
        <span>📋</span>
        <span>Histórico</span>
      </a>
    </nav>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✏️ Editar Viagem</h2>
        <button onclick="closeEditModal()" class="modal-close">✕</button>
      </div>
      
      <form id="editForm">
        <input type="hidden" id="editId">
        
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="editData">
        </div>

        <div class="form-group">
          <label>KMs Rodados na Viagem</label>
          <input type="text" id="editKmRodados" inputmode="decimal">
        </div>

        <div class="form-group">
          <label>Valor Bruto da Viagem (R$)</label>
          <input type="text" id="editValorBruto" inputmode="decimal">
        </div>

        <h3 class="section-title">Parâmetros de Custo</h3>

        <div class="form-group">
          <label>Preço Combustível (R$)</label>
          <input type="text" id="editPrecoCombustivel" inputmode="decimal">
        </div>

        <div class="form-group">
          <label>KM por Litro</label>
          <input type="text" id="editKmPorLitro" inputmode="decimal">
        </div>

        <div class="form-group">
          <label>Custo de Locação do Veículo (R$)</label>
          <input type="text" id="editAluguelDiario" inputmode="decimal">
        </div>

        <div class="form-actions">
          <button type="button" onclick="saveEditRide()" class="btn btn-primary">Salvar Alterações</button>
          <button type="button" onclick="closeEditModal()" class="btn btn-secondary">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnderUber - Histórico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-time" id="horaAtual">22:28</div>
      <div class="header-brand">
        <span class="brand-icon">🚗</span>
        <h1 class="header-title">UnderUber</h1>
        <span class="header-subtitle">Histórico</span>
      </div>
    </header>

    <div id="historicoContent">
      <div class="day-summary" id="daySummary">
        <div class="day-date">Qua, 22/07/2026</div>
        <div class="day-rides">0 corrida</div>
        <div class="day-profit" id="dayProfit">Lucro do dia R$ 0,00</div>
      </div>

      <div id="historicoList" class="historico-list"></div>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>📊</span>
        <span>Dashboard</span>
      </a>
      <a href="nova-corrida.html" class="nav-item">
        <span>➕</span>
        <span>Nova Corrida</span>
      </a>
      <a href="historico.html" class="nav-item active">
        <span>📋</span>
        <span>Histórico</span>
      </a>
    </nav>
  </div>

  <!-- ===== MODAL DE EDIÇÃO ===== -->
  <div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✏️ Editar Viagem</h2>
        <button onclick="closeEditModal()" class="modal-close">✕</button>
      </div>
      
      <form id="editForm">
        <input type="hidden" id="editId">
        
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="editData">
        </div>

        <div class="form-group">
          <label>KM Rodados</label>
          <input type="number" id="editKmRodados" step="0.1" required>
        </div>

        <div class="form-group">
          <label>Valor Bruto (R$)</label>
          <input type="number" id="editValorBruto" step="0.01" required>
        </div>

        <h3 class="section-title">Parâmetros de Custo</h3>

        <div class="form-group">
          <label>Preço Combustível (R$)</label>
          <input type="number" id="editPrecoCombustivel" step="0.01">
        </div>

        <div class="form-group">
          <label>KM por Litro</label>
          <input type="number" id="editKmPorLitro" step="0.1">
        </div>

        <div class="form-group">
          <label>Aluguel Diário (R$)</label>
          <input type="number" id="editAluguelDiario" step="0.01">
        </div>

        <div class="form-actions">
          <button type="button" onclick="saveEditRide()" class="btn btn-primary">Salvar Alterações</button>
          <button type="button" onclick="closeEditModal()" class="btn btn-secondary">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
